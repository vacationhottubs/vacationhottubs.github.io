        <div class="container pb-5">
          <h1 class="fw-light pt-4 pb-3">Contact Us</h1>
          <p>Please complete the following form to reach out to Vacation Hot Tubs. Your name and phone number are required.</p>
          <form action="" method="post">
            <label class="mt-2" for="fullName">Name <span class="text-danger">*</span></label>
            <input type="text" id="fullName" class="form-control" name="fullName" placeholder="First and Last Name" required>
            <label class="mt-2" for="phone">Phone <span class="text-danger">*</span></label>
            <input type="tel" id="phone" class="form-control" name="phone" placeholder="Phone Number">
            <label class="mt-2" for="address">Property Address</label>
            <input type="text" id="address" class="form-control" name="address" placeholder="Property Street Address">
            <label class="mt-2" for="city">Property City</label>
            <input type="text" id="city" class="form-control" name="city" placeholder="Property City">
            <label class="mt-2" for="message">Message</label>
            <textarea type="text" id="message" class="form-control" name="message" placeholder="Message" rows="4" style="resize: vertical;"></textarea>
            <button type="submit" class="btn btn-outline-dark mt-3">Submit</button>
          </form>
        </div>
